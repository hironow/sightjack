# prek (j178/prek) - Rust reimplementation of pre-commit.
# Install: just install-hooks
# Run:     just pre-commit
minimum_prek_version: "0.3.0"

exclude: |
  (?x)^(
    dist/|
    docs/cli/|
    node_modules/|
    \.venv/|
    \.siren/|
    \.expedition/|
    \.gate/|
    \.pass/|
    internal/.*/testdata/|
    testdata/|
    tests/.*/fixtures/|
    tests/.*/testdata/
  )

repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: just-fmt
        name: just fmt
        entry: just fmt
        language: system
        pass_filenames: false
        files: '\.(go|md|yaml|toml|json)$'

      - id: just-lint
        name: just lint
        entry: just lint
        language: system
        pass_filenames: false
        files: '\.(go|md|yaml|toml|json)$'

  - repo: local
    hooks:
      - id: just-check
        name: just check
        entry: just check
        language: system
        pass_filenames: false
        stages: [pre-push]
