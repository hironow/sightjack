rules:
  # ==========================================================================
  # Shared ADR enforcement rules (CANONICAL — identical across all tools)
  #
  # Covers statically-detectable patterns from shared ADRs (refs/shared-adr/):
  # - Core ADRs 0001, 0003, 0005, 0007-0009 (Go code enforcement)
  # - D4 resource leak detection (per CLAUDE.md SQLite cooperative model)
  #
  # Not covered (no static enforcement):
  # - ADR 0000 (governance), ADR 0002 (stdio — see stdio.yaml)
  # - ADR 0004 (data format), ADR 0006 (build config)
  # - ADRs S0009-S0029 (see layers.yaml / adr.yaml in each tool)
  #
  # Ref: refs/shared-adr/ (canonical source for shared ADRs)
  # ==========================================================================

  # --- ADR 0001: cobra CLI conventions ---

  # Rule 1: cobra.Command with Run instead of RunE
  # Source: ADR 0001 — "All commands use RunE"
  - id: adr0001-cobra-run-without-rune
    languages: [go]
    message: |
      cobra.Command で Run フィールドを使用しないでください。
      Why: Run は error を返せないため、main() での exit code 制御ができなくなります (cobra CLI convention)。
      How: RunE を使用して error を返すようにしてください。
    severity: ERROR
    pattern: |
      &cobra.Command{
        ...,
        Run: $FUNC,
        ...,
      }

  # --- ADR 0003: OTel noop-default ---

  # Rule 2: otel.SetTracerProvider outside InitTracer
  # Source: ADR 0003 — centralized tracer initialization
  - id: adr0003-otel-set-tracer-provider-outside-init
    languages: [go]
    message: |
      otel.SetTracerProvider() は InitTracer() 内でのみ呼び出してください。
      Why: TracerProvider の設定を分散させると noop デフォルトの保証が崩れます (OTel noop-default)。
      How: InitTracer() 関数内に集約してください。
    severity: ERROR
    patterns:
      - pattern: otel.SetTracerProvider(...)
      - pattern-not-inside: |
          func InitTracer(...) $RET {
            ...
          }
    paths:
      exclude:
        - "*_test.go"

  # Rule 3: otel.SetMeterProvider outside InitTracer
  # Source: ADR 0003 — centralized provider initialization
  - id: adr0003-otel-set-meter-provider-outside-init
    languages: [go]
    message: |
      otel.SetMeterProvider() は InitTracer() 内でのみ呼び出してください。
      Why: MeterProvider の設定を分散させると noop デフォルトの保証が崩れます (OTel noop-default)。
      How: TracerProvider と同様に InitTracer() 関数内に集中管理してください。
    severity: WARNING
    patterns:
      - pattern: otel.SetMeterProvider(...)
      - pattern-not-inside: |
          func InitTracer(...) $RET {
            ...
          }
    paths:
      exclude:
        - "*_test.go"

  # Rule 4: OTel span without defer End
  # Source: ADR 0003 — OTel noop-default, span lifecycle
  - id: adr0003-otel-span-without-defer-end
    languages: [go]
    message: |
      tracer.Start() で作成した span に defer $SPAN.End() がありません。
      Why: span が End されないとメモリリークし、エクスポーターにも送信されません (OTel noop-default)。
      How: defer $SPAN.End() を追加してください。startRootSpan 等の別関数で End する場合は nosemgrep を付与してください。
    severity: ERROR
    patterns:
      - pattern: |
          $CTX, $SPAN := $TRACER.Start(...)
      - pattern-not-inside: |
          $CTX, $SPAN := $TRACER.Start(...)
          ...
          defer $SPAN.End()

  # --- ADR 0005: fsnotify daemon ---

  # Rule 5: fsnotify.NewWatcher without defer Close
  # Source: ADR 0005 — watcher lifecycle management
  - id: adr0005-fsnotify-watcher-without-close
    languages: [go]
    message: |
      fsnotify.NewWatcher() の後に defer $W.Close() がありません。
      Why: watcher のファイルディスクリプタがリークします (fsnotify daemon design)。
      How: 同一関数内で defer watcher.Close() を呼び出してください。struct に保存して別途 Close する場合は nosemgrep を付与してください。
    severity: ERROR
    patterns:
      - pattern: |
          $W, $ERR := fsnotify.NewWatcher()
      - pattern-not-inside: |
          $W, $_ := fsnotify.NewWatcher()
          ...
          defer $W.Close()

  # Rule 6: String concatenation for file paths
  # Source: ADR 0005 + Go convention — use filepath.Join
  - id: adr0005-string-concat-file-path
    languages: [go]
    message: |
      文字列連結 (+ "/" +) でファイルパスを構築しないでください。
      Why: OS 間のパス区切り文字の違いを吸収できず、重複スラッシュも正規化されません (fsnotify daemon design)。
      How: filepath.Join() を使用してください。マップキーや表示用ラベルの場合は nosemgrep を付与してください。
    severity: WARNING
    pattern-regex: '\+\s*"/"\s*\+'
    paths:
      exclude:
        - "*_test.go"

  # Rule 7: mutex Lock without defer Unlock
  # Source: ADR 0005 — thread-safe daemon operations
  - id: adr0005-mutex-lock-without-defer-unlock
    languages: [go]
    message: |
      $M.Lock() の直後に defer $M.Unlock() がありません。
      Why: Lock/Unlock のペアリングを忘れるとデッドロックの原因になります (fsnotify daemon design)。
      How: defer $M.Unlock() を追加してください。条件付き Unlock が必要な場合は nosemgrep を付与してください。
    severity: ERROR
    patterns:
      - pattern: $M.Lock()
      - pattern-not-inside: |
          $M.Lock()
          ...
          defer $M.Unlock()

  # --- ADR 0007: Docker E2E testing ---

  # Rule 8: testcontainers.GenericContainer without Terminate
  # Source: ADR 0007 — container cleanup in Docker E2E
  - id: adr0007-testcontainers-generic-without-terminate
    languages: [go]
    message: |
      testcontainers.GenericContainer() で作成したコンテナに Terminate() が呼ばれていません。
      Why: コンテナリソースがリークし、テスト後にポートやメモリが解放されません (Docker E2E testing)。
      How: defer func() { container.Terminate(ctx) }() または t.Cleanup(func() { container.Terminate(ctx) }) で確実に停止してください。
    severity: ERROR
    patterns:
      - pattern: |
          $CONTAINER, $ERR := testcontainers.GenericContainer(...)
      - pattern-not-inside: |
          $CONTAINER, $_ := testcontainers.GenericContainer(...)
          ...
          $CONTAINER.Terminate(...)
    paths:
      include:
        - "*_test.go"

  # Rule 9: Mock/stub usage in Docker E2E tests
  # Source: ADR 0007 — "All dependencies must be real"
  - id: adr0007-mock-in-docker-test
    languages: [go]
    message: |
      Docker E2E テスト (_docker_test.go) でモックを使用しないでください。
      Why: 全ての依存は実サービスで構成すべきです (Docker E2E testing)。
      How: モックが必要なテストは integration テストに移動してください。
    severity: WARNING
    pattern-either:
      - pattern: gomock.NewController(...)
      - pattern: httptest.NewServer(...)
      - pattern: httptest.NewTLSServer(...)
    paths:
      include:
        - "*_docker_test.go"

  # --- ADR 0008: Signal context propagation ---

  # Rule 10: signal.Notify instead of signal.NotifyContext
  # Source: ADR 0008 — prefer NotifyContext for context-based cancellation
  - id: adr0008-signal-notify-instead-of-notifycontext
    languages: [go]
    message: |
      signal.Notify() ではなく signal.NotifyContext() を使用してください。
      Why: signal.NotifyContext は context のキャンセルチェーンに統合され、goroutine リークのリスクも低減されます (signal context propagation)。
      How: signal.Notify(ch, signals...) を ctx, stop := signal.NotifyContext(ctx, signals...) に置き換えてください。
    severity: ERROR
    pattern: signal.Notify(...)
    paths:
      exclude:
        - "*_test.go"
        - "cmd/*/main.go"

  # Rule 11: Execute() without context
  # Source: ADR 0008 — "ExecuteContext(ctx) passes context to cobra root command"
  - id: adr0008-execute-without-context
    languages: [go]
    message: |
      $CMD.Execute() ではなく $CMD.ExecuteContext(ctx) を使用してください。
      Why: Execute() ではシグナルコンテキストが cobra コマンドに伝播されず、Ctrl+C 時にキャンセルされません (signal context propagation)。
      How: signal.NotifyContext で作成した ctx を $CMD.ExecuteContext(ctx) に渡してください。
    severity: ERROR
    pattern: $CMD.Execute()
    paths:
      include:
        - "/internal/cmd/**"
      exclude:
        - "*_test.go"

  # --- ADR 0009: Config-relative state directory ---

  # Rule 12: os.Getwd in cobra command handler
  # Source: ADR 0009 — state dir from configBase(cmd), not CWD
  - id: adr0009-os-getwd-in-cobra-cmd
    languages: [go]
    message: |
      cobra コマンド内で os.Getwd() を使用しないでください。
      Why: CWD 依存はテストの非決定性とパスのずれを引き起こします (config-relative state directory)。
      How: 状態ディレクトリは configBase(cmd) から取得してください。
    severity: WARNING
    patterns:
      - pattern: os.Getwd()
      - pattern-inside: |
          func($CMD *cobra.Command, $ARGS []string) error {
            ...
          }

  # --- OTel UTF-8 safety ---

  # Rule 14: attribute.String with unsanitized variable value
  # Source: OTel protobuf requires valid UTF-8 in string fields.
  # External data (Claude output, fsnotify events, error messages) may contain
  # invalid UTF-8 bytes, causing "traces export: string field contains invalid UTF-8".
  - id: otel-attribute-string-unsanitized
    languages: [go]
    message: |
      attribute.String() に SanitizeUTF8 でラップされていない変数を渡しています。
      Why: 外部データ（Claude 出力、ファイルシステムイベント、エラーメッセージ）には無効な UTF-8 バイトが含まれる可能性があり、OTel export 時にエラーになります。
      How: platform.SanitizeUTF8(val) または SanitizeUTF8(val) でラップしてください。文字列リテラルの場合は nosemgrep を付与してください。
    severity: ERROR
    patterns:
      - pattern: attribute.String($KEY, $VAL)
      - pattern-not: attribute.String($KEY, "...")
      - pattern-not: attribute.String($KEY, platform.SanitizeUTF8(...))
      - pattern-not: attribute.String($KEY, SanitizeUTF8(...))

  # Rule 15: attribute.StringSlice with unsanitized values
  - id: otel-attribute-stringslice-unsanitized
    languages: [go]
    message: |
      attribute.StringSlice() に渡すスライスの各要素を SanitizeUTF8 でラップしてください。
      Why: 外部データには無効な UTF-8 バイトが含まれる可能性があり、OTel export 時にエラーになります。
      How: platform.SanitizeUTF8Slice(vals) または SanitizeUTF8Slice(vals) でラップしてください。
    severity: ERROR
    patterns:
      - pattern: attribute.StringSlice($KEY, $VAL)
      - pattern-not: attribute.StringSlice($KEY, platform.SanitizeUTF8Slice(...))
      - pattern-not: attribute.StringSlice($KEY, SanitizeUTF8Slice(...))

  # --- S0032: Claude CLI stream-json requires --verbose ---

  # Rule 16: --output-format stream-json without --verbose
  # Source: S0032 — Claude CLI 2.1.x requires --verbose with --print --output-format stream-json
  - id: s0032-stream-json-without-verbose
    languages: [go]
    message: |
      "--output-format", "stream-json" を使用する場合は "--verbose" フラグが必須です。
      Why: Claude CLI 2.1.x では --print --output-format stream-json に --verbose が必要で、ないと exit status 1 で即座に失敗します (S0032)。
      How: "--verbose" を "--output-format", "stream-json" の前に追加してください。
    severity: ERROR
    patterns:
      - pattern: |
          $CMD := $FUNC($CTX, $NAME, ..., "--output-format", "stream-json", ...)
      - pattern-not: |
          $CMD := $FUNC($CTX, $NAME, ..., "--verbose", ..., "--output-format", "stream-json", ...)
      - pattern-not: |
          $CMD := $FUNC($CTX, $NAME, ..., "--output-format", "stream-json", ..., "--verbose", ...)

  # Rule 17: args append with stream-json without --verbose
  - id: s0032-args-append-stream-json-without-verbose
    languages: [go]
    message: |
      "--output-format", "stream-json" を append する前に "--verbose" を append してください。
      Why: Claude CLI 2.1.x では --verbose が必須で、ないと exit status 1 で即座に失敗します (S0032)。
      How: $ARGS = append($ARGS, "--verbose") を "--output-format", "stream-json" の append の前に追加してください。
    severity: ERROR
    patterns:
      - pattern: |
          $ARGS = append($ARGS, "--output-format", "stream-json")
      - pattern-not-inside: |
          $ARGS = append($ARGS, "--verbose")
          ...
          $ARGS = append($ARGS, "--output-format", "stream-json")
      - pattern-not-inside: |
          $ARGS = append($ARGS, ..., "--verbose", ...)
          ...
          $ARGS = append($ARGS, "--output-format", "stream-json")
    fix: |
      $ARGS = append($ARGS, "--verbose", "--output-format", "stream-json")

  # Rule 18: []string literal with stream-json without --verbose
  - id: s0032-string-slice-stream-json-without-verbose
    languages: [go]
    message: |
      []string リテラルに "--output-format", "stream-json" を含む場合、"--verbose" も含めてください。
      Why: Claude CLI 2.1.x では --verbose が必須で、ないと exit status 1 で即座に失敗します (S0032)。
      How: []string リテラルに "--verbose" を追加してください。
    severity: ERROR
    patterns:
      - pattern: |
          []string{..., "--output-format", "stream-json", ...}
      - pattern-not: |
          []string{..., "--verbose", ..., "--output-format", "stream-json", ...}
      - pattern-not: |
          []string{..., "--output-format", "stream-json", ..., "--verbose", ...}

  # --- D4: Resource leak detection ---

  # Rule 13: sql.Open without defer Close
  # Source: CLAUDE.md — SQLite in .run/, connection lifecycle management
  - id: d4-sql-open-without-defer-close
    languages: [go]
    message: |
      sql.Open() の後に defer $DB.Close() がありません。
      Why: データベース接続がリークし、SQLite の WAL ロックが解放されません (SQLite WAL cooperative model)。
      How: defer $DB.Close() を追加してください。struct に保存して別途 Close する場合は nosemgrep を付与してください。
    severity: ERROR
    patterns:
      - pattern: |
          $DB, $ERR := sql.Open(...)
      - pattern-not-inside: |
          $DB, $_ := sql.Open(...)
          ...
          defer $DB.Close()
