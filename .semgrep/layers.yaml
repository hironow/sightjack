rules:
  # ==========================================================================
  # Layer dependency direction enforcement (CANONICAL — identical across all tools)
  #
  # 5-layer architecture:
  #   internal/cmd         — cobra CLI (top layer)
  #   internal/usecase     — orchestration (COMMAND, Aggregate, POLICY dispatch)
  #   internal/session     — I/O orchestration (filesystem, network, subprocess)
  #   internal/eventsource — event store infrastructure
  #   internal/domain      — pure functions (no I/O, no context)
  #   {tool} (root)        — types, interfaces, constants, go:embed, aggregates
  #
  # Dependency direction: cmd → usecase → session → eventsource/domain → root
  # Reverse direction is PROHIBITED.
  #
  # Ref: phonewave docs/adr/S0005-root-infrastructure-and-layer-conventions.md
  #      phonewave docs/adr/S0008-cmd-eventsource-import-prohibition.md
  #      phonewave docs/adr/S0017-aggregate-root-and-usecase-layer.md
  # ==========================================================================

  # --- Rule 1: Root package must not import internal/ ---

  - id: layer-root-no-import-internal
    languages: [go]
    message: |
      root パッケージから internal/ への import は禁止です。
      依存方向: cmd → usecase → session → eventsource/domain → root（逆方向不可）
      root は types, interfaces, constants, pure functions, go:embed のみ。
      I/O が必要な場合は internal/session/ に実装してください。
      Ref: phonewave docs/adr/S0005-root-infrastructure-and-layer-conventions.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/.*"
    paths:
      include:
        - "*.go"
      exclude:
        - "/internal/**"
        - "/cmd/**"

  # --- Rule 2: Session must not import cmd ---

  - id: layer-session-no-import-cmd
    languages: [go]
    message: |
      session 層から cmd 層への import は禁止です。
      依存方向: cmd → usecase → session → eventsource/domain → root（逆方向不可）
      session は eventsource, domain, root を import できます。
      Ref: phonewave docs/adr/S0005-root-infrastructure-and-layer-conventions.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/cmd"
    paths:
      include:
        - "/internal/session/**"

  # --- Rule 3: Domain must not import upper layers ---

  - id: layer-domain-no-import-upper
    languages: [go]
    message: |
      domain 層から上位層への import は禁止です。
      依存方向: domain → root のみ。
      domain は pure functions のみ（I/O なし、context.Context なし）。
      I/O が必要な処理は internal/session/ で行ってください。
      Ref: phonewave docs/adr/S0005-root-infrastructure-and-layer-conventions.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/(session|cmd|eventsource|usecase)"
    paths:
      include:
        - "/internal/domain/**"

  # --- Rule 4: Eventsource must not import upper layers ---

  - id: layer-eventsource-no-import-upper
    languages: [go]
    message: |
      eventsource 層から上位層への import は禁止です。
      依存方向: eventsource → domain/root のみ。
      eventsource は event store infrastructure のみ。
      orchestration は internal/session/ で行ってください。
      Ref: phonewave docs/adr/S0005-root-infrastructure-and-layer-conventions.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/(session|cmd|usecase)"
    paths:
      include:
        - "/internal/eventsource/**"

  # --- Rule 5: cmd must not import domain ---

  - id: layer-cmd-no-import-domain
    languages: [go]
    message: |
      cmd 層から domain 層への直接 import は禁止です。
      session 層の wrapper 関数を経由してください。
      依存方向: cmd → usecase → session → domain（cmd → domain は禁止）
      domain の pure functions は session/usecase 経由でアクセスしてください。
      Ref: phonewave docs/adr/S0005-root-infrastructure-and-layer-conventions.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/domain"
    paths:
      include:
        - "/internal/cmd/**"

  # --- Rule 6: cmd must not import eventsource (ADR S0008) ---

  - id: s0008-cmd-no-import-eventsource
    languages: [go]
    message: |
      cmd 層から eventsource 層への直接 import は禁止です。
      session 層のファクトリ関数を経由してください。
      依存方向: cmd → session → eventsource（cmd → eventsource は禁止）
      Ref: phonewave docs/adr/S0008-cmd-eventsource-import-prohibition.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/eventsource"
    paths:
      include:
        - "/internal/cmd/**"

  # --- Rule 7: usecase must not import cmd (ADR S0017) ---

  - id: layer-usecase-no-import-cmd
    languages: [go]
    message: |
      usecase 層から cmd 層への import は禁止です。
      依存方向: cmd → usecase → session → eventsource/domain → root（逆方向不可）
      usecase は session, domain, root を import できます。
      Ref: phonewave docs/adr/S0017-aggregate-root-and-usecase-layer.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/cmd"
    paths:
      include:
        - "/internal/usecase/**"

  # --- Rule 8: usecase must not import eventsource directly (ADR S0017) ---

  - id: layer-usecase-no-import-eventsource
    languages: [go]
    message: |
      usecase 層から eventsource 層への直接 import は禁止です。
      session 層のファクトリ関数を経由してください。
      依存方向: usecase → session → eventsource（usecase → eventsource は禁止）
      Ref: phonewave docs/adr/S0017-aggregate-root-and-usecase-layer.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/eventsource"
    paths:
      include:
        - "/internal/usecase/**"

  # --- Rule 9: session must not import usecase (ADR S0017) ---

  - id: layer-session-no-import-usecase
    languages: [go]
    message: |
      session 層から usecase 層への import は禁止です。
      依存方向: cmd → usecase → session → eventsource/domain → root（逆方向不可）
      session は eventsource, domain, root のみ import できます。
      Ref: phonewave docs/adr/S0017-aggregate-root-and-usecase-layer.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/usecase"
    paths:
      include:
        - "/internal/session/**"
