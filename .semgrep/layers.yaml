rules:
  # ==========================================================================
  # Layer dependency direction enforcement
  # 依存方向: cmd → session → eventsource/domain → root (逆方向禁止)
  #
  # sightjack は 4 層構造:
  #   internal/cmd       — cobra CLI (top layer)
  #   internal/session   — I/O orchestration, adapter implementations
  #   internal/eventsource — event store infrastructure
  #   internal/domain    — pure functions (no I/O, no context)
  #   sightjack (root)   — types, interfaces, constants, go:embed
  #
  # Ref: docs/adr/0011-es-layer-first-refactoring.md
  #      docs/adr/0012-root-package-io-cleanup.md
  #      phonewave docs/adr/S0005-root-infrastructure-and-layer-conventions.md
  # ==========================================================================

  # --- Rule 1: Root package must not import internal/ ---

  - id: layer-root-no-import-internal
    languages: [go]
    message: |
      root パッケージから internal/ への import は禁止です。
      依存方向: cmd → session → eventsource/domain → root（逆方向不可）
      root は types, interfaces, constants, pure functions, go:embed のみ。
      I/O が必要な場合は internal/session/ に実装してください。
      Ref: docs/adr/0012-root-package-io-cleanup.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/.*"
    paths:
      include:
        - "*.go"
      exclude:
        - "/internal/**"
        - "/cmd/**"

  # --- Rule 2: Session must not import cmd ---

  - id: layer-session-no-import-cmd
    languages: [go]
    message: |
      session 層から cmd 層への import は禁止です。
      依存方向: cmd → session → eventsource/domain → root（逆方向不可）
      session は eventsource, domain, root を import できます。
      Ref: docs/adr/0011-es-layer-first-refactoring.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/cmd"
    paths:
      include:
        - "/internal/session/**"

  # --- Rule 3: Domain must not import session, cmd, or eventsource ---

  - id: layer-domain-no-import-upper
    languages: [go]
    message: |
      domain 層から session/cmd/eventsource 層への import は禁止です。
      依存方向: domain → root のみ。
      domain は pure functions のみ（I/O なし、context.Context なし）。
      I/O が必要な処理は internal/session/ で行ってください。
      Ref: docs/adr/0011-es-layer-first-refactoring.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/(session|cmd|eventsource)"
    paths:
      include:
        - "/internal/domain/**"

  # --- Rule 4: Eventsource must not import session or cmd ---

  - id: layer-eventsource-no-import-upper
    languages: [go]
    message: |
      eventsource 層から session/cmd 層への import は禁止です。
      依存方向: eventsource → domain/root のみ。
      eventsource は event store infrastructure のみ。
      orchestration は internal/session/ で行ってください。
      Ref: docs/adr/0011-es-layer-first-refactoring.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/(session|cmd)"
    paths:
      include:
        - "/internal/eventsource/**"

  # --- Rule 5: cmd must not import domain ---

  - id: layer-cmd-no-import-domain
    languages: [go]
    message: |
      cmd 層から domain 層への直接 import は禁止です。
      session 層の wrapper 関数を経由してください。
      依存方向: cmd → session → domain（cmd → domain は禁止）
      domain の pure functions は session 経由でアクセスしてください。
      Ref: docs/adr/0011-es-layer-first-refactoring.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/domain"
    paths:
      include:
        - "/internal/cmd/**"

  # --- Rule 6: cmd must not import eventsource (ADR S0008) ---

  - id: s0008-cmd-no-import-eventsource
    languages: [go]
    message: |
      cmd 層から eventsource 層への直接 import は禁止です。
      session 層のファクトリ関数を経由してください。
      依存方向: cmd → session → eventsource（cmd → eventsource は禁止）
      Ref: phonewave docs/adr/S0008-cmd-eventsource-import-prohibition.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/eventsource"
    paths:
      include:
        - "/internal/cmd/**"
