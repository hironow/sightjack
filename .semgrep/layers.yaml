rules:
  # ==========================================================================
  # Layer dependency direction enforcement (CANONICAL — identical across all tools)
  #
  # 6-layer architecture:
  #   internal/cmd         — cobra CLI (top layer)
  #   internal/usecase     — orchestration (COMMAND, Aggregate, POLICY dispatch)
  #   internal/session     — I/O orchestration (filesystem, network, subprocess)
  #   internal/eventsource — event store infrastructure
  #   internal/platform    — cross-cutting infrastructure (logger, telemetry, metrics)
  #   internal/domain      — pure functions, types, interfaces (no I/O, no context)
  #
  # Allowed dependency directions:
  #   cmd      → usecase, domain
  #   usecase  → session, domain
  #   session  → eventsource, domain
  #   eventsource → domain
  #   platform → domain
  #   domain   → (nothing internal)
  #
  # PROHIBITED reverse directions are enforced below.
  #
  # Note: cmd → domain is ALLOWED (type/interface references, pure method calls).
  #       cmd → session is PROHIBITED (must go through usecase).
  #       cmd → eventsource is PROHIBITED (ADR S0008).
  #
  # Ref: phonewave docs/adr/S0005-root-infrastructure-and-layer-conventions.md
  #      phonewave docs/adr/S0008-cmd-eventsource-import-prohibition.md
  #      phonewave docs/adr/S0017-aggregate-root-and-usecase-layer.md
  # ==========================================================================

  # --- Rule 1: Root package must not import internal/ ---

  - id: layer-root-no-import-internal
    languages: [go]
    message: |
      root パッケージから internal/ への import は禁止です。
      root は doc.go のみ（go:embed が必要な場合を除く）。
      Ref: phonewave docs/adr/S0005-root-infrastructure-and-layer-conventions.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/.*"
    paths:
      include:
        - "*.go"
      exclude:
        - "/internal/**"
        - "/cmd/**"

  # --- Rule 2: Session must not import cmd ---

  - id: layer-session-no-import-cmd
    languages: [go]
    message: |
      session 層から cmd 層への import は禁止です。
      session は eventsource, domain のみ import できます。
      Ref: phonewave docs/adr/S0005-root-infrastructure-and-layer-conventions.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/cmd"
    paths:
      include:
        - "/internal/session/**"

  # --- Rule 3: Domain must not import upper layers ---

  - id: layer-domain-no-import-upper
    languages: [go]
    message: |
      domain 層から上位層への import は禁止です。
      domain は pure functions のみ（I/O なし、context.Context なし）。
      Ref: phonewave docs/adr/S0005-root-infrastructure-and-layer-conventions.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/(session|cmd|eventsource|usecase|platform)"
    paths:
      include:
        - "/internal/domain/**"

  # --- Rule 4: Eventsource must not import upper layers ---

  - id: layer-eventsource-no-import-upper
    languages: [go]
    message: |
      eventsource 層から上位層への import は禁止です。
      eventsource → domain のみ。
      Ref: phonewave docs/adr/S0005-root-infrastructure-and-layer-conventions.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/(session|cmd|usecase)"
    paths:
      include:
        - "/internal/eventsource/**"

  # --- Rule 5: cmd must not import eventsource (ADR S0008) ---

  - id: s0008-cmd-no-import-eventsource
    languages: [go]
    message: |
      cmd 層から eventsource 層への直接 import は禁止です。
      usecase 層のファクトリ関数を経由してください。
      依存方向: cmd → usecase → session → eventsource（cmd → eventsource は禁止）
      Ref: phonewave docs/adr/S0008-cmd-eventsource-import-prohibition.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/eventsource"
    paths:
      include:
        - "/internal/cmd/**"

  # --- Rule 6: usecase must not import cmd (ADR S0017) ---

  - id: layer-usecase-no-import-cmd
    languages: [go]
    message: |
      usecase 層から cmd 層への import は禁止です。
      usecase は session, domain を import できます。
      Ref: phonewave docs/adr/S0017-aggregate-root-and-usecase-layer.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/cmd"
    paths:
      include:
        - "/internal/usecase/**"

  # --- Rule 7: usecase must not import eventsource directly (ADR S0017) ---

  - id: layer-usecase-no-import-eventsource
    languages: [go]
    message: |
      usecase 層から eventsource 層への直接 import は禁止です。
      session 層のファクトリ関数を経由してください。
      Ref: phonewave docs/adr/S0017-aggregate-root-and-usecase-layer.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/eventsource"
    paths:
      include:
        - "/internal/usecase/**"

  # --- Rule 8: session must not import usecase (ADR S0017) ---

  - id: layer-session-no-import-usecase
    languages: [go]
    message: |
      session 層から usecase 層への import は禁止です。
      session は eventsource, domain のみ import できます。
      Ref: phonewave docs/adr/S0017-aggregate-root-and-usecase-layer.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/usecase"
    paths:
      include:
        - "/internal/session/**"

  # --- Rule 9: cmd must not import session directly ---

  - id: layer-cmd-no-import-session
    languages: [go]
    message: |
      cmd 層から session 層への直接 import は禁止です。
      usecase 層を経由してください。
      依存方向: cmd → usecase → session（cmd → session は禁止）
      Ref: phonewave docs/adr/S0017-aggregate-root-and-usecase-layer.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/session"
    paths:
      include:
        - "/internal/cmd/**"

  # --- Rule 10: internal must not import root package ---

  - id: layer-no-root-package-import
    languages: [go]
    message: |
      internal/ から root パッケージへの import は禁止です。
      root パッケージの型・関数は internal/domain に移動済みです。
      internal/domain を import してください。
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: "^github\\.com/hironow/phonewave$"
    paths:
      include:
        - "/internal/**"

  # --- Rule 11: platform must not import upper layers ---

  - id: layer-platform-no-import-upper
    languages: [go]
    message: |
      platform 層から上位層への import は禁止です。
      platform は domain のみ import できます。
      platform は cross-cutting infrastructure（logger, telemetry, metrics）のみ。
      Ref: phonewave docs/adr/S0005-root-infrastructure-and-layer-conventions.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/(session|cmd|usecase|eventsource)"
    paths:
      include:
        - "/internal/platform/**"
