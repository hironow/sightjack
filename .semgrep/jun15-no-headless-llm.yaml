# jun15 MCP pivot: forbid headless LLM invocation paths.
#
# Source of truth: refs/HTMLification/docs/issues/0027-jun15-mcp-pivot.html §6
# (canonical, repo-wide scan in production paths only). paintress
# Phase 1 (PR #213, ADR 0017) established the canonical 9-commit
# pattern; sightjack Phase 2a copies it verbatim and adapts only the
# transitional exclude path.
#
# Path strategy (v4 from refs 0027):
# - Executable paths (justfile / scripts/** / *.sh / production Go) = ERROR
# - Test fixtures and archives = excluded (allowlist)
# - Active docs / markdown = out of scope (mention is allowed)
#
# Phase 2a transitional excludes for internal/session/claude_adapter.go
# and internal/session/doctor.go were removed in sub-B once both files
# stopped invoking `claude --print` directly. Test fixtures retain the
# allowlist because tests/** uses a fake-claude binary that mimics the
# wire format but never crosses the billing boundary.

rules:
  - id: jun15-no-claude-print-exec-go
    message: |
      `claude -p` / `--print` exec is forbidden (refs/issues/0027 MCP pivot).
      Route inference through the human-initiated claude code session via
      MCP server tools instead.
    severity: ERROR
    languages: [go]
    patterns:
      - pattern-either:
          - pattern: exec.Command("claude", "-p", ...)
          - pattern: exec.CommandContext(..., "claude", "-p", ...)
          - pattern: exec.Command("claude", "--print", ...)
          - pattern: exec.CommandContext(..., "claude", "--print", ...)
    paths:
      exclude:
        # Test fixtures that intentionally invoke a fake claude binary.
        - tests/**

  - id: jun15-no-anthropic-sdk-import-go
    message: |
      Anthropic Agent SDK import is forbidden post 6/15 MCP pivot.
      Use the claude code session's MCP transport instead.
    severity: ERROR
    languages: [go]
    pattern: import "github.com/anthropics/anthropic-sdk-go"
    paths:
      exclude:
        - tests/**

  - id: jun15-no-anthropic-api-key-read
    message: |
      ANTHROPIC_API_KEY env read is forbidden post 6/15 MCP pivot.
      Subscription-only billing path means the Go CLI does not need a
      direct API key; the human-initiated claude code session owns auth.
    severity: ERROR
    languages: [go]
    pattern: os.Getenv("ANTHROPIC_API_KEY")
    paths:
      exclude:
        - tests/**

  - id: jun15-no-claude-print-shell-wrapper
    message: |
      `claude -p` / `--print` via shell wrapper (bash -lc / sh -c) is
      forbidden. The shell hop hides the headless invocation from the
      Go AST scan above.
    severity: ERROR
    languages: [go]
    pattern-regex: 'exec\.Command(Context)?\([^)]*?(bash|sh|zsh)[^)]*?-[lc]+[^)]*?claude[^)]*?--?(p|print)\b'
    paths:
      exclude:
        - tests/**
        - .semgrep/**

  - id: jun15-no-claude-print-literal-executable
    message: |
      `claude -p` / `--print` literal in an executable path is forbidden.
      Scoped to justfile / scripts/** / *.sh / hooks config so docs that
      reference the flag in prose are not affected.
    severity: ERROR
    languages: [generic]
    pattern-regex: '\bclaude\s+(-p|--print)\b'
    paths:
      include:
        - "justfile"
        - "scripts/**"
        - "*.sh"
        - "*.bash"
        - "*.zsh"
        - "hooks.yaml"
        - ".claude/hooks/**"
      exclude:
        - "**/tests/**"
        - "**/docs/**"
