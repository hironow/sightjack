name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout=300s

      - name: Test (race)
        run: go test ./... -race -count=1 -short

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install semgrep
        run: pip install semgrep

      - name: Run semgrep
        run: semgrep --config .semgrep/ internal/ --error

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run E2E tests
        run: |
          docker compose -f tests/e2e/compose-e2e.yaml build
          docker compose -f tests/e2e/compose-e2e.yaml run --rm e2e \
            go test -tags e2e ./tests/e2e/ -count=1 -v -timeout=600s

      - name: Cleanup
        if: always()
        run: docker compose -f tests/e2e/compose-e2e.yaml down -v

  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate CLI docs
        run: go run ./internal/tools/docgen/

      - name: Check for uncommitted doc changes
        run: git diff --exit-code docs/cli/

      - name: Check dead links in docs
        run: |
          ok=true
          for f in $(find docs/ README.md -name '*.md' 2>/dev/null); do
            dir=$(dirname "$f")
            grep -oE '\[([^]]*)\]\(([^)]+)\)' "$f" | grep -oE '\(([^)]+)\)' | tr -d '()' | grep -v '^http' | grep -v '^#' | while read -r link; do
              target="$dir/$link"
              target="${target%%#*}"
              if [ ! -f "$target" ] && [ ! -d "$target" ]; then
                echo "DEAD LINK: $f -> $link (resolved: $target)"
                echo "DEAD_LINK_FOUND=true" >> "$GITHUB_ENV"
              fi
            done
          done
          if [ "${DEAD_LINK_FOUND:-}" = "true" ]; then exit 1; fi

      - name: Check forbidden vocabulary in docs
        run: |
          if grep -rn 'LINEAR_API_KEY' docs/ README.md internal/ 2>/dev/null | grep -v '_test\.go' | grep -v '\.semgrep/'; then
            echo "ERROR: Found LINEAR_API_KEY reference"
            exit 1
          fi
