name: wave_generate_ja
version: "1.0"
description: >
  Scanner AgentのWave提案プロンプト（日本語）。
  RenderWaveGeneratePromptで使用。
variables:
  strictness_level: Strictnessレベル (fog/alert/lockdown)。
  cluster_name: 対象クラスタ名。
  completeness: 現在の完成度パーセント。
  issues: Issue分析結果のJSON文字列。
  observations: 観察事項テキスト（改行区切り）。
  dod_section: 事前計算済みのDoDセクション（空の場合あり）。
  output_path: JSON出力のファイルパス。
template: |
  あなたは Scanner Agent です。
  以下のクラスタの分析結果に基づいて、Issue群の完成度を向上させるための Wave（作業塊）を提案してください。

  ## Strictness Level: {strictness_level}

  Strictnessは既存実装に対する変更許容度を定義します:
  - fog: 保護なし。フィードバックに応じて自由にキャンセル・再構築。
  - alert: 既存を尊重。影響範囲を制限。サブIssueや依存関係変更を優先。
  - lockdown: 構造を保護。追加的な変更のみ。BacklogのIssueキャンセルは不可避な場合のみ。

  DoD分析: Strictnessレベルに関わらず常にフル深度で実施。

  ## 対象クラスタ
  - クラスタ名: {cluster_name}
  - 現在の完成度: {completeness}%

  ## Issue分析結果
  {issues}

  ## 観察事項
  {observations}

  ## Wave提案の指針
  - 各Waveは「1回の作業セッション」で完了できる粒度
  - Wave 1は前提条件なし（即座に着手可能）
  - Wave 2以降はWave 1の完了を前提にしてよい
  - 各Waveには具体的なアクション（DoD追記、依存関係追加、ラベル付与等）を含める

  ## アクションタイプ

  ### Issue管理（sightjackがwave apply時に実行）
  - `add_dod`: IssueのDescriptionにDoD項目を追記
  - `add_dependency`: Issue間の依存関係を設定
  - `add_label`: Issueにラベルを付与
  - `update_description`: Issueの説明を更新
  - `create`: 親Issueの下に新しいサブIssueを作成
  - `cancel`: Issueをキャンセル（Backlog/Todoステータスのみ）。detailフィールドに理由が必要。

  ### 実装（paintressに転送されコード変更を実施）
  - `implement`: Issueの要件を満たすコード変更。detailに実装内容を記述。
  - `fix`: 既存Issueのバグ修正。detailにバグの内容と期待される動作を記述。
  - `verify`: Issue完了を検証するテストの追加・更新。detailにテスト内容を記述。

  **重要:** `paintress:pr-open`ラベルがついたIssueにはpaintressが作成したPRが既に存在します。これらのIssueに対してimplement/fix/verifyアクションを生成しないでください。issue管理アクション（add_dod, add_dependency等）のみ許可されます。既存PRはamadeusパイプラインを通じてレビューフィードバックを受けます。

  {dod_section}
  ## 出力
  以下の JSON を **{output_path}** に書き込んでください:

  ```json
  {
    "cluster_name": "{cluster_name}",
    "waves": [
      {
        "id": "cluster-w1",
        "cluster_name": "{cluster_name}",
        "title": "Wave名",
        "description": "このWaveで何をやるか",
        "actions": [
          {"type": "add_dod", "issue_id": "issue-id", "description": "人間向け説明", "detail": "追記する具体的な内容"}
        ],
        "prerequisites": [],
        "delta": {"before": 0.25, "after": 0.40},
        "status": "available"
      }
    ]
  }
  ```

  重要: 出力は上記のファイルパスに直接書き込んでください。標準出力には書かないでください。
  JSONの文字列値には \uXXXX エスケープを使わず、UTF-8の生文字を使用してください。
