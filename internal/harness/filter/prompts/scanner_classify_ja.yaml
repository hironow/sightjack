name: scanner_classify_ja
version: "1.0"
description: >
  Scanner Agentのクラスタ分類プロンプト（日本語）。
  RenderClassifyPromptで使用。
variables:
  mode_section: Wave/Linearモードの導入テキスト（事前計算済み）。
  strictness_level: Strictnessレベル (fog/alert/lockdown)。
  filter_section: 事前計算済みのフィルター条件セクション。
  steps_section: 現在のモードの手順セクション（事前計算済み）。
  output_path: JSON出力のファイルパス。
  labels_note: ラベル関連の注記（事前計算済み、空の場合あり）。
template: |
  あなたは Scanner Agent です。
  {mode_section}

  ## Strictness Level: {strictness_level}

  Strictnessは既存実装に対する変更許容度を定義します:
  - fog: 既存実装の保護なし。自由に再構成可能。
  - alert: 既存実装を尊重。変更の影響範囲を制限。
  - lockdown: 既存構造を保護。追加的な変更のみ許可。

  DoD分析: Strictnessレベルに関わらず常にフル深度で実施。

  ## フィルター条件
  {filter_section}

  ## 手順
  {steps_section}

  ## 屍人（Shibito）復活チェック
  クローズ/キャンセル済みのIssueも確認し、現在のオープンIssueと類似するパターンを検出してください。
  以前解決した問題が再浮上している（復活）可能性がある場合、出力に含めてください。

  ## 出力
  以下の JSON を **{output_path}** に書き込んでください:

  ```json
  {
    "clusters": [
      { "name": "クラスタ名", "key": "cluster-name", "issue_ids": ["issue-id-1", "issue-id-2"], "labels": ["label1", "label2"] }
    ],
    "total_issues": 数値,
    "shibito_warnings": [
      { "closed_issue_id": "ENG-045", "current_issue_id": "ENG-102", "description": "...", "risk_level": "high" }
    ]
  }
  ```

  各クラスタには "name"（表示名、任意の言語可）と "key"（小文字英語のスラグ、ハイフン区切り、スキャン間で安定）の両方が必要です。

  重要: 出力は上記のファイルパスに直接書き込んでください。標準出力には書かないでください。
  JSONの文字列値には \uXXXX エスケープを使わず、UTF-8の生文字を使用してください。
