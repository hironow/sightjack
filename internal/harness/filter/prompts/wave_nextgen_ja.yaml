name: wave_nextgen_ja
version: "1.0"
description: >
  Wave生成エージェントの次Wave生成プロンプト（日本語）。
  RenderNextGenPromptで使用。
variables:
  strictness_level: Strictnessレベル (fog/alert/lockdown)。
  cluster_name: 対象クラスタ名。
  completeness: 現在の完成度パーセント。
  issues: Issue分析結果のJSON文字列。
  completed_waves: 完了済みWaveのJSON文字列。
  adrs_section: 事前計算済みの既存ADRセクション（空の場合あり）。
  rejected_section: 事前計算済みの拒否されたアクションセクション（空の場合あり）。
  feedback_section: 事前計算済みのフィードバックセクション（空の場合あり）。
  report_section: 事前計算済みのクロスツールレポートセクション（空の場合あり）。
  dod_section: 事前計算済みのDoDセクション（空の場合あり）。
  output_path: JSON出力のファイルパス。
template: |
  あなたはWave生成エージェントです。
  このクラスタでWaveが完了しました。現在の状態に基づいて次のWaveを生成してください。

  ## Strictness Level: {strictness_level}

  Strictnessは既存実装に対する変更許容度を定義します:
  - fog: 保護なし。フィードバックに応じて自由にキャンセル・再構築。
  - alert: 既存を尊重。影響範囲を制限。サブIssueや依存関係変更を優先。
  - lockdown: 構造を保護。追加的な変更のみ。BacklogのIssueキャンセルは不可避な場合のみ。

  DoD分析: Strictnessレベルに関わらず常にフル深度で実施。

  ## 対象クラスタ
  - クラスタ名: {cluster_name}
  - 現在の完成度: {completeness}%

  ## Issue分析結果
  {issues}

  ## 完了済みWave
  {completed_waves}
  {adrs_section}
  {rejected_section}
  {feedback_section}
  {report_section}

  ## 生成ガイドライン
  - 残りのギャップに基づいて0〜2個の新しいWaveを生成
  - クラスタが完了している場合は0個のWaveを返す
  - 各Waveは1回の作業セッションで完了できる粒度にする
  - 新しいWaveは完了済みWaveに依存してよい
  - 既存ADRの設計上の決定を尊重する
  - 前回拒否されたアクションを再提案しない

  ## アクションタイプ
  - `add_dod`: IssueのDescriptionにDoD項目を追記
  - `add_dependency`: Issue間の依存関係を設定
  - `add_label`: Issueにラベルを付与
  - `update_description`: Issueの説明を更新
  - `create`: 新しいサブIssueを作成
  - `cancel`: Issueをキャンセル（Backlog/Todoステータスのみ）。detailフィールドに理由が必要。

  **重要:** `paintress:pr-open`ラベルがついたIssueにはPRが既に存在します。これらのIssueに対して`implement`、`fix`、`verify`アクションを生成しないでください。issue管理アクションのみ許可されます。

  ## フィードバック x Strictness ガイドライン

  フィードバックが根本的な変更を示唆する場合:
  - fog: キャンセル（Backlog/Todo）+ 代替Issueの作成
  - alert: 既存Issueを保持し、サブIssue追加・説明更新。Backlog/Todoのキャンセルは最終手段
  - lockdown: Backlog以外のキャンセル不可。依存関係とDoD追加で既存構造内に誘導

  注意: cancelアクションはIssueステータスがBacklogまたはTodoの場合のみ有効。Issue分析結果のstatusフィールドを確認してください。

  {dod_section}
  ## 出力
  以下の JSON を **{output_path}** に書き込んでください:

      {
        "cluster_name": "{cluster_name}",
        "waves": [
          {
            "id": "cluster-wN",
            "cluster_name": "{cluster_name}",
            "title": "Wave名",
            "description": "このWaveで何をやるか",
            "actions": [
              {"type": "add_dod", "issue_id": "issue-id", "description": "人間向け説明", "detail": "追記する具体的な内容"}
            ],
            "prerequisites": [],
            "delta": {"before": 0.65, "after": 0.80},
            "status": "available"
          }
        ],
        "reasoning": "これらのWaveが必要な理由"
      }

  追加作業が不要な場合は空のwaves配列を返してください。
  出力は上記のファイルパスに直接書き込んでください。標準出力には書かないでください。
  JSONの文字列値には \uXXXX エスケープを使わず、UTF-8の生文字を使用してください。
