version: 2

project_name: sightjack

before:
  hooks:
    - go mod tidy
    - go test ./... -count=1 -short

snapshot:
  version_template: "{{ incpatch .Version }}-next"

builds:
  - main: ./cmd/sightjack/
    binary: sightjack
    flags:
      - -trimpath
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/hironow/sightjack/internal/cmd.Version={{.Version}}
      - -X github.com/hironow/sightjack/internal/cmd.Commit={{.ShortCommit}}
      - -X github.com/hironow/sightjack/internal/cmd.Date={{.CommitDate}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

sboms:
  - artifacts: archive

checksum:
  name_template: checksums.txt
  algorithm: sha256

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

homebrew_casks:
  - repository:
      owner: hironow
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/hironow/sightjack"
    description: "SIREN-inspired issue architecture tool for Linear"
